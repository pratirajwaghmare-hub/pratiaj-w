<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>css loader</title>
	<style type="text/css">
		body{
			margin: 0;
			padding: 0;
			background: #334aff;
		}
		.lana
		{
			height: 300px;
			width: 100%;
			background: #334aff;
		}
		.circle{
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%,-50%);
			width: 100px;
			height: 100px;
			border-radius: 50%;
			border: 10px solid rgba(255, 255, 255, .1);
			border-top: 10px solid #fff;
			animation: hyto 1.5s infinite linear;
		}
		@keyframes hyto {
			0%{
				transform: rotate(0deg);
			}
			100%{
				transform: rotate(360deg);
			}
		}

     
	</style>
</head>
<body>
	<div class="lana">
		<div class="circle">
  	
	</div>
 
  	
  </div>


</body>
</html>
